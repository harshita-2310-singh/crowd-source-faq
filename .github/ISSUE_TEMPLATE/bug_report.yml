name: Bug Report
description: Something is broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        For **security issues**, do NOT open a public issue — email the maintainers directly
        (see `.github/ISSUE_TEMPLATE/config.yml` for the private advisory link).

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the system is affected?
      options:
        - Backend (Express / Mongoose)
        - Frontend (React / Vite)
        - Admin / Train tab (`/admin/*`)
        - Community (`/community` — posts, comments, auto-answer)
        - Search (hybrid text retrieval, training stats)
        - Auth / middleware / samagama.in bridge
        - Crons / schedulers / embedding-warm
        - Observability (Sentry / logging / Discord alerts)
        - Infrastructure / Docker / CI workflows
        - Other
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: "Node version, OS, branch name or commit SHA, deployed commit (if known)"
      placeholder: "Node 22.x, Ubuntu 22.04, main @ 3458d58, deployed v1.71"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably trigger the bug
      placeholder: |
        1. POST /api/community with body { "title": "...", "body": "...", "tags": ["..."] }
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste backend logs (apps/backend/main_log.txt), browser console errors, or API responses
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: UI bugs — attach a screenshot or screen recording

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Related issues, workarounds discovered, suspected root cause
